name: Release

on:
  push:
    tags:
      - "v*"

# Allow the workflow to write to GitHub Releases.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin   # Apple Silicon
          - os: macos-13
            target: x86_64-apple-darwin    # Intel Mac
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artefacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install JS dependencies
        working-directory: app
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Google OAuth credentials — add these in GitHub → Settings → Secrets
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
          VITE_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.VITE_GOOGLE_ANDROID_CLIENT_ID }}
          # Points the in-app update checker at this repo
          VITE_GITHUB_REPO: ${{ github.repository }}
          # Optional: your Ko-fi and GitHub links shown in Settings → About
          VITE_KOFI_URL: ${{ vars.VITE_KOFI_URL }}
          VITE_GITHUB_URL: ${{ vars.VITE_GITHUB_URL }}
          # Tauri updater signing — required for silent auto-update to work
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # macOS code signing (optional — app still works unsigned)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: ./app
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "Konsou ${{ github.ref_name }}"
          releaseBody: |
            ## What's new

            See the full changelog in [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).

            ---

            ### Download
            | Platform | File |
            |---|---|
            | Windows | `.msi` installer |
            | macOS (Apple Silicon) | `.dmg` |
            | macOS (Intel) | `.dmg` |
            | Linux | `.AppImage` or `.deb` |

            > **First time installing on macOS?** Right-click the `.dmg` → Open, then confirm you want to open it. This is a one-time step for apps not yet in the Mac App Store.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
